# OpenClaw Demo — nginx routing
# Each service gets its own subdomain so absolute-path JS apps work correctly.
#
# DNS setup (all point to same Vultr IP):
#   demo.YOUR-DOMAIN.com        → pixel-office  (landing / main)
#   pit.demo.YOUR-DOMAIN.com    → pit-stop      (Agent Fitting Room)
#   agents.demo.YOUR-DOMAIN.com → agents-dashboard
#   cron.demo.YOUR-DOMAIN.com   → cron-dashboard
#   phoenix.demo.YOUR-DOMAIN.com→ phoenix (if enabled)

# ── pixel-office (landing page) ──────────────────────────────────────────────
server {
    listen 80;
    server_name demo.ping-claw.cc _;

    location / {
        proxy_pass http://pixel-office:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── pit-stop ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name pit.demo.ping-claw.cc;

    location / {
        proxy_pass http://pit-stop:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── agents-dashboard ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name agents.demo.ping-claw.cc;

    location / {
        proxy_pass http://agents-dashboard:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── cron-dashboard ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name cron.demo.ping-claw.cc;

    location / {
        proxy_pass http://cron-dashboard:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /;
    }
}

