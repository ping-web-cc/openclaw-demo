services:

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pit-stop
      - agents-dashboard
      - cron-dashboard
      - pixel-office
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei

  # ── OpenClaw gateway (demo agents) ──────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_VERSION:-2026.3.12}
    command:
      - node
      - openclaw.mjs
      - gateway
      - --allow-unconfigured
    ports:
      - "18789:18789"
    environment:
      TZ: Asia/Taipei
      OPENCLAW_GATEWAY_PORT: "18789"
    volumes:
      - ~/.openclaw:/home/node/.openclaw:ro
    restart: unless-stopped

  # ── OpenClaw Pit Stop (demo) ─────────────────────────────────────────────
  pit-stop:
    build: ${SERVICES_DIR:-~/projects}/pit-stop-demo
    expose:
      - "18790"
    environment:
      TZ: Asia/Taipei
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ~/.openclaw:/home/node/.openclaw:ro
    depends_on:
      - openclaw
    restart: unless-stopped

  # ── Agents Dashboard ─────────────────────────────────────────────────────
  agents-dashboard:
    build:
      context: ${SERVICES_DIR:-~/projects}/agents-dashboard
      args:
        VITE_BASE_PATH: /
    expose:
      - "3001"
    environment:
      TZ: Asia/Taipei
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_DIR: /data/openclaw
      MEMORY_DB_PATH: /data/openclaw/memory/lancedb-pro
    volumes:
      - ~/.openclaw:/data/openclaw:ro
    restart: unless-stopped

  # ── Cron Dashboard (demo: no docker socket, ephemeral DB) ────────────────
  cron-dashboard:
    build: ${SERVICES_DIR:-~/projects}/openclaw-docker-public/cron-dashboard
    expose:
      - "5000"
    environment:
      TZ: Asia/Taipei
      DASHBOARD_PASSWORD: ${CRON_DASHBOARD_PASSWORD:-demo}
      SECRET_KEY: ${CRON_DASHBOARD_SECRET_KEY:-demo-secret-key}
      LOG_RETENTION_DAYS: "7"
    # No docker socket mount → tasks won't actually execute (demo intent)
    # No data volume → DB resets on container restart (demo intent)
    restart: unless-stopped

  # ── Pixel Office ─────────────────────────────────────────────────────────
  pixel-office:
    build: ${SERVICES_DIR:-~/projects}/pixel-office
    expose:
      - "3000"
    environment:
      TZ: Asia/Taipei
    volumes:
      - ~/.openclaw:/root/.openclaw-personal:ro
    restart: unless-stopped

  # ── Arize Phoenix (optional, ~1.5GB RAM) ─────────────────────────────────
